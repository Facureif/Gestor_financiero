{% extends 'finances/base.html' %}

{% block title %}{% if cliente %}Editar{% else %}Nuevo{% endif %} Cliente{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4>
                    {% if cliente %}
                        <i class="bi bi-pencil"></i> Editar Cliente
                    {% else %}
                        <i class="bi bi-person-plus"></i> Nuevo Cliente
                    {% endif %}
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <h5 class="border-bottom pb-2 mb-3">Datos Principales</h5>
                    
                    <div class="row mb-3">
                        <div class="col-md-8">
                            <label class="form-label">Nombre/Razón Social *</label>
                            <input type="text" name="nombre" class="form-control" required
                                   value="{{ cliente.nombre|default:'' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">CUIT/CUIL</label>
                            <input type="text" name="cuit" class="form-control"
                                   value="{{ cliente.cuit|default:'' }}">
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Persona de Contacto</label>
                            <input type="text" name="nombre_contacto" class="form-control"
                                   value="{{ cliente.nombre_contacto|default:'' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" name="telefono" class="form-control"
                                   value="{{ cliente.telefono|default:'' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control"
                                   value="{{ cliente.email|default:'' }}">
                        </div>
                    </div>
                    
                    <h5 class="border-bottom pb-2 mb-3 mt-4">Dirección</h5>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Dirección</label>
                            <input type="text" name="direccion" class="form-control"
                                   value="{{ cliente.direccion|default:'' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Ciudad</label>
                            <input type="text" name="ciudad" class="form-control"
                                   value="{{ cliente.ciudad|default:'' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Provincia</label>
                            <input type="text" name="provincia" class="form-control"
                                   value="{{ cliente.provincia|default:'' }}">
                        </div>
                    </div>
                    
                    <h5 class="border-bottom pb-2 mb-3 mt-4">Servicio</h5>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Sistema</label>
                            <input type="text" name="sistema" class="form-control"
                                   value="{{ cliente.sistema|default:'' }}"
                                   placeholder="Ej: Sistema de Concesionaria">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Plan</label>
                            <input type="text" name="plan" class="form-control"
                                   value="{{ cliente.plan|default:'' }}"
                                   placeholder="Ej: Premium">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Cliente desde</label>
                            <input type="date" name="fecha_inicio" class="form-control"
                                   value="{{ cliente.fecha_inicio|date:'Y-m-d'|default:'' }}">
                        </div>
                    </div>
                    
                    <h5 class="border-bottom pb-2 mb-3 mt-4">Notas</h5>
                    
                    <div class="mb-3">
                        <textarea name="notas" class="form-control" rows="3">{{ cliente.notas|default:'' }}</textarea>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save"></i> 
                            {% if cliente %}Actualizar{% else %}Guardar{% endif %} Cliente
                        </button>
                        <a href="javascript:history.back()" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
